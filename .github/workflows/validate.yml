name: Validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  repo-validation:
    name: Repo Validation (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run validation tests
        run: python -B -m unittest discover -s tests -p "test_*.py" -v
